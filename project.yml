name: Crosswords
options:
  bundleIdPrefix: com.crosswords
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: 1
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_CFBundleDisplayName: Crosswords

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    minorVersion: 11.0.0

targets:
  Crosswords:
    type: application
    platform: iOS
    sources:
      - path: Crosswords
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crosswords.app
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  CrosswordsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CrosswordsTests
    dependencies:
      - target: Crosswords
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crosswords.app.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Crosswords:
    build:
      targets:
        Crosswords: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CrosswordsTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
