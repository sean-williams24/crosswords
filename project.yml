name: Backword
options:
  bundleIdPrefix: com.backword
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: 1
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_CFBundleDisplayName: BackWord

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    minorVersion: 11.0.0

targets:
  Backword:
    type: application
    platform: iOS
    sources:
      - path: Backword
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.backword.app
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  BackwordTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BackwordTests
    dependencies:
      - target: Backword
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.backword.app.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  Backword:
    build:
      targets:
        Backword: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BackwordTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
