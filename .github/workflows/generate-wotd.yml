name: Generate Words of the Day

on:
  schedule:
    - cron: "0 8 1 */3 *"  # Quarterly: 1st of every 3rd month at 08:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r Backend/requirements.txt

      - name: Determine start date
        id: dates
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 -c "
          from supabase import create_client
          from datetime import date, timedelta
          import os
          sb = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
          rows = sb.table('words_of_the_day').select('date').order('date', desc=True).limit(1).execute()
          if rows.data:
              last = date.fromisoformat(rows.data[0]['date'])
              print(f'start={(last + timedelta(days=1)).isoformat()}')
          else:
              print(f'start={(date.today() + timedelta(days=1)).isoformat()}')
          " >> "$GITHUB_OUTPUT"

      - name: Generate and upload words
        id: generate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -o pipefail
          echo "Generating 90 WOTDs starting from ${{ steps.dates.outputs.start }}"
          python3 Backend/generate_wotd.py \
            --date "${{ steps.dates.outputs.start }}" \
            --count 90 \
            --batch-size 30 | tee /tmp/wotd-generation-output.txt

      - name: Create issue if generation fails
        if: failure() && steps.generate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const label = 'wotd-generation-failure';
            const title = 'Word of the Day generation failed';
            const outputPath = '/tmp/wotd-generation-output.txt';
            const output = fs.existsSync(outputPath)
              ? fs.readFileSync(outputPath, 'utf8').trim()
              : 'No generator output file was captured.';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `WOTD generation failed again.\n\nRun: ${runUrl}\n\n\`\`\`text\n${output.slice(-6000)}\n\`\`\``
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The Word of the Day generation workflow failed.\n\nRun: ${runUrl}\n\n\`\`\`text\n${output.slice(-6000)}\n\`\`\``,
              labels: [label]
            });
